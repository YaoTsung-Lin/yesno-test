
<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="/socket.io/socket.io.js"></script>
<style>
body{font-family:Microsoft JhengHei;text-align:center;padding:20px}
.question{font-size:56px;font-weight:bold;min-height:160px}
.btn{font-size:48px;padding:25px 80px;margin:10px;border:none;border-radius:15px;color:#fff}
.y{background:green}.n{background:red}
.sel{outline:8px solid gold}
.hide{display:none}
</style></head><body>
<h1>YES / NO 投票</h1>
<div id=qno></div>
<div class=question id=q></div>
<button id=yes class="btn y" onclick="vote('yes')">YES</button>
<button id=no class="btn n" onclick="vote('no')">NO</button>
<h2>🟢 YES:<span id=yc>0</span></h2>
<h2>🔴 NO:<span id=nc>0</span></h2>
<div id=host>
<button id=prev onclick="socket.emit('prev')">上一題</button>
<button id=next onclick="socket.emit('next')">下一題</button>
<button onclick="socket.emit('reset')">重置</button>
<a href="/results.html">統計頁</a>
</div>
<script>
const socket=io();
const mode=new URLSearchParams(location.search).get("mode")||"player";
if(mode!=="host") document.getElementById("host").classList.add("hide");

let userId=localStorage.userId||crypto.randomUUID();
localStorage.userId=userId;

let answers=JSON.parse(localStorage.answers||"{}");

function paint(){
 yes.classList.remove("sel"); no.classList.remove("sel");
 const c=answers[cur];
 if(c==="yes") yes.classList.add("sel");
 if(c==="no") no.classList.add("sel");
}

let cur=0;

socket.on("state",s=>{
 cur=s.current;
 qno.innerHTML=`第 ${cur+1} 題 / 共 ${s.questions.length} 題`;
 q.innerHTML=s.questions[cur];
 yc.innerHTML=s.results[cur].yes;
 nc.innerHTML=s.results[cur].no;

 prev.disabled=(cur===0);
 next.disabled=(cur===s.questions.length-1);
 paint();
});

function vote(a){
 answers[cur]=a;
 localStorage.answers=JSON.stringify(answers);
 paint();
 socket.emit("vote",{question:cur,answer:a,userId});
}
</script></body></html>
