
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YES / NO 即時投票</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
  margin:0;
  background:#f6f1e8;
  font-family:"Microsoft JhengHei", sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:90%;
  max-width:700px;
  background:white;
  border-radius:24px;
  padding:30px;
  box-shadow:0 8px 24px rgba(0,0,0,0.15);
  text-align:center;
}

h1{
  color:#5d4037;
}

.question{
  font-size:34px;
  margin:35px 0;
  min-height:100px;
}

.vote-buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:30px;
}

button{
  border:none;
  border-radius:18px;
  padding:18px 48px;
  font-size:28px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}

.yes{
  background:#43a047;
  color:white;
}

.no{
  background:#e53935;
  color:white;
}

.next{
  background:#6d4c41;
  color:white;
  font-size:18px;
  padding:12px 28px;
}

.result{
  font-size:24px;
  line-height:2;
}

.admin{
  border-top:1px solid #ddd;
  margin-top:30px;
  padding-top:20px;
}

.small{
  color:#777;
  font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h1>YES / NO 即時投票</h1>

<div id="questionNo"></div>

<div class="question" id="question"></div>

<div class="vote-buttons">
  <button class="yes" onclick="vote('yes')">YES</button>
  <button class="no" onclick="vote('no')">NO</button>
</div>

<div class="result">
  YES：<span id="yesCount">0</span> 票<br>
  NO：<span id="noCount">0</span> 票
</div>

<div class="admin">
  <button class="next" onclick="nextQuestion()">下一題</button>

  <div class="small">
    主持人控制用：按下後所有人同步切換
  </div>
</div>

</div>

<script>

const socket = io();

socket.on("update", (data) => {

  document.getElementById("questionNo").innerHTML =
    `第 ${data.currentQuestion + 1} 題 / 共 ${data.total} 題`;

  document.getElementById("question").innerHTML =
    data.question;

  document.getElementById("yesCount").innerHTML =
    data.results.yes;

  document.getElementById("noCount").innerHTML =
    data.results.no;

});

function vote(type){
  socket.emit("vote", type);
}

function nextQuestion(){
  socket.emit("nextQuestion");
}

</script>

</body>
</html>
